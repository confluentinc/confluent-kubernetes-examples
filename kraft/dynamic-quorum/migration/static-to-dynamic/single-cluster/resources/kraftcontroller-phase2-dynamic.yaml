---
# KRaftController with CFK-managed Dynamic Quorum (final state)
# Phase 2: Enable dynamicQuorumConfig — CFK generates controller.quorum.bootstrap.servers
# Applied after kraft.version has been upgraded to 1
apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: confluent
spec:
  replicas: 3
  storageClass:
    name: retain-sc
  dataVolumeCapacity: 10Gi
  image:
    application: confluentinc/cp-server:8.1.2
    init: confluentinc/confluent-init-container:3.2.0
  dynamicQuorumConfig:
    enabled: true
    # No bootstrapPod — cluster is already formatted and running (not a greenfield deploy)
    # No ConfigMap or RBAC needed for migrated clusters
  # CFK uses controllerQuorumVoters to generate controller.quorum.bootstrap.servers
  controllerQuorumVoters:
    - nodeId: 9990
      brokerEndpoint: kraftcontroller-0.kraftcontroller.confluent.svc.cluster.local:9074
    - nodeId: 9991
      brokerEndpoint: kraftcontroller-1.kraftcontroller.confluent.svc.cluster.local:9074
    - nodeId: 9992
      brokerEndpoint: kraftcontroller-2.kraftcontroller.confluent.svc.cluster.local:9074

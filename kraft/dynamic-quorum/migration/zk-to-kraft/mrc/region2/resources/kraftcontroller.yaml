---
# KRaftController for Region 2 (East) - Dynamic Quorum (Observer)
# Cluster: my-clusterdev, Namespace: east
# Node IDs: 200-202 (observer — joins quorum started by region1 bootstrapPod: 0)
# clusterID must match region1 — set after region1 bootstrap completes
#
# Held until KRaftMigrationJob triggers it via kraft-migration-hold-krc-creation annotation.
# Security: TLS (secretRef) + SASL/PLAIN on controller listener + RBAC
apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: east
  annotations:
    platform.confluent.io/use-log4j1: "true"
    platform.confluent.io/use-old-jetty9: "true"
    platform.confluent.io/broker-id-offset: "200"
    # Hold KRC creation until KRaftMigrationJob triggers it
    platform.confluent.io/kraft-migration-hold-krc-creation: "true"
spec:
  replicas: 3
  dataVolumeCapacity: 10Gi
  storageClass:
    name: standard-rwo

  mountedVolumes:
    volumes:
      - name: admin-config
        configMap:
          name: kraft-admin-config
    volumeMounts:
      - name: admin-config
        mountPath: /mnt/admin-config

  # clusterID: KMJ sets this from the Kafka cluster ID during SETUP.
  # Do NOT pre-populate — it's immutable once set and KMJ will fail if it differs.
  # For greenfield (non-KMJ): get from Region 1 after bootstrap:
  #   kubectl --context <region1> get kraftcontroller kraftcontroller -n central -o jsonpath='{.status.clusterID}'

  image:
    application: confluentinc/cp-server:7.9.6
    init: confluentinc/confluent-init-container:3.2.0

  tls:
    secretRef: tls-kraftcontroller

  authorization:
    type: rbac
    superUsers:
      - User:kafka
      - User:ssologin

  listeners:
    # Required for MRC: advertise LB public DNS so cross-cluster clients can reach this controller
    advertisedListenersEnabled: true
    controller:
      tls:
        enabled: true
      authentication:
        type: plain
        jaasConfig:
          secretRef: credential
      externalAccess:
        type: loadBalancer
        loadBalancer:
          domain: my-domain.example.com
          brokerPrefix: kraft-east

  # Cross-cluster quorum voters — required for MRC so observers can discover the quorum
  controllerQuorumVoters:
    # Region 1 (central) - 3 controllers
    - nodeId: 100
      brokerEndpoint: kraft-central0.my-domain.example.com:9074
    - nodeId: 101
      brokerEndpoint: kraft-central1.my-domain.example.com:9074
    - nodeId: 102
      brokerEndpoint: kraft-central2.my-domain.example.com:9074
    # Region 2 (east) - 3 controllers
    - nodeId: 200
      brokerEndpoint: kraft-east0.my-domain.example.com:9074
    - nodeId: 201
      brokerEndpoint: kraft-east1.my-domain.example.com:9074
    - nodeId: 202
      brokerEndpoint: kraft-east2.my-domain.example.com:9074

  # Dynamic quorum configuration (KIP-853)
  # No bootstrapPod — this region joins the existing quorum as observers
  dynamicQuorumConfig:
    enabled: true

  # KRaft RBAC: reference Kafka's TOKEN listener (port 9073) via public DNS
  dependencies:
    mdsKafkaCluster:
      bootstrapEndpoint: kafka-east-rep.my-domain.example.com:9073
      authentication:
        type: oauth
        jaasConfig:
          secretRef: oauth-jass
        oauthSettings:
          tokenEndpointUri: http://keycloak.my-domain.example.com:8080/realms/sso_test/protocol/openid-connect/token
      tls:
        enabled: true

  # CP 7.9.6: configOverrides.jvm replaces allowed.urls=* from CFK template
  configOverrides:
    jvm:
      - "-Dorg.apache.kafka.sasl.oauthbearer.allowed.urls=http://keycloak.my-domain.example.com:8080/realms/sso_test/protocol/openid-connect/certs,http://keycloak.my-domain.example.com:8080/realms/sso_test/protocol/openid-connect/token,http://keycloak.my-domain.example.com:8080/"

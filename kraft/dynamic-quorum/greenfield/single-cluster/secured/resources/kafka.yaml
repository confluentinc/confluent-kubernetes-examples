---
# Kafka Cluster using KRaft Controllers - Secured with TLS + LDAP RBAC
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: confluent
spec:
  replicas: 3
  dataVolumeCapacity: 10Gi
  
  image:
    application: confluentinc/cp-server:8.1.0
    init: confluentinc/confluent-init-container:3.2.0
  
  # TLS Configuration - Auto-generated certificates
  tls:
    autoGeneratedCerts: true
  
  # Confluent RBAC Authorization
  authorization:
    type: rbac
    superUsers:
      - User:kafka
      - User:admin
  
  # MDS (Metadata Service) for RBAC with LDAP
  services:
    mds:
      tls:
        enabled: true
      tokenKeyPair:
        secretRef: mds-token
      provider:
        type: ldap
        ldap:
          address: ldap://ldap.confluent.svc.cluster.local:389
          authentication:
            type: simple
            simple:
              secretRef: credential
          configurations:
            groupNameAttribute: cn
            groupObjectClass: group
            groupMemberAttribute: member
            groupMemberAttributePattern: CN=(.*),DC=test,DC=com
            groupSearchBase: dc=test,dc=com
            userNameAttribute: cn
            userMemberOfAttributePattern: CN=(.*),DC=test,DC=com
            userObjectClass: organizationalRole
            userSearchBase: dc=test,dc=com
      externalAccess:
        type: loadBalancer
        loadBalancer:
          domain: my-domain.example.com
          prefix: kafka-mds
    # Kafka REST for embedded operations
    kafkaRest:
      authentication:
        type: basic
        basic:
          secretRef: mds-client-erp
  
  # Listeners Configuration
  listeners:
    internal:
      tls:
        enabled: true
      authentication:
        type: plain
        jaasConfig:
          secretRef: credential

  # Reference the KRaft controller cluster
  dependencies:
    kRaftController:
      clusterRef:
        name: kraftcontroller
      controllerListener:
        tls:
          enabled: true
        authentication:
          type: plain
          jaasConfig:
            secretRef: credential
    kafkaRest:
      authentication:
        type: bearer
        bearer:
          secretRef: mds-client-erp

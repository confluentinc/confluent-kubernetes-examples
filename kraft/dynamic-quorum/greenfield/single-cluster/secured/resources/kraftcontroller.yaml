---
# KRaftController with Dynamic Quorum - Secured with TLS + SASL/PLAIN
apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: confluent
spec:
  replicas: 3
  dataVolumeCapacity: 10Gi

  # Use custom ServiceAccount with ConfigMap update permissions
  podTemplate:
    serviceAccountName: kraftcontroller-sa

  mountedVolumes:
    volumes:
      - name: admin-config
        configMap:
          name: kraft-admin-config
    volumeMounts:
      - name: admin-config
        mountPath: /mnt/admin-config

  image:
    application: confluentinc/cp-server:8.1.0
    init: confluentinc/confluent-init-container:3.2.0

  # TLS Configuration - Auto-generated certificates
  tls:
    autoGeneratedCerts: true

  # External Access via LoadBalancer (for cross-namespace if needed)
  listeners:
    controller:
      tls:
        enabled: true
      authentication:
        type: plain
        jaasConfig:
          secretRef: credential

  # Dynamic Quorum Configuration
  dynamicQuorumConfig:
    enabled: true
    bootstrapPod: 0

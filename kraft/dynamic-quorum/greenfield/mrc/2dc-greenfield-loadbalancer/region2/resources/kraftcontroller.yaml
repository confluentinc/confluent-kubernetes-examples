---
# KRaftController for Region 2 (East) - Greenfield with Dynamic Quorum (Observer)
# Cluster: my-clusterdev
# Namespace: east
#
# Observer: no bootstrapPod — joins existing quorum from Region 1
# Must be promoted to voter after deployment via kafka-metadata-quorum add-controller
#
# Security: TLS (secretRef) + SASL/PLAIN on controller listener + RBAC with OAuth MDS (Keycloak)
apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: east
  annotations:
    # Node IDs: 200, 201, 202
    platform.confluent.io/broker-id-offset: "200"
spec:
  podTemplate:
    annotations:
      kafkacluster-manual-roll: "1"

  replicas: 3
  dataVolumeCapacity: 10Gi

  mountedVolumes:
    volumes:
      - name: admin-config
        configMap:
          name: kraft-admin-config
    volumeMounts:
      - name: admin-config
        mountPath: /mnt/admin-config

  # CRITICAL: Must match the cluster ID from Region 1 (set by setup.sh)
  clusterID: OGYzZTUxNzEtNjgxOC00Yg

  image:
    application: confluentinc/cp-server:8.1.2
    init: confluentinc/confluent-init-container:3.2.0

  # TLS Configuration - secretRef based certificates
  tls:
    secretRef: tls-kraftcontroller

  # RBAC Authorization
  authorization:
    type: rbac
    superUsers:
      - User:kafka
      - User:ssologin

  # Listeners with TLS + SASL/PLAIN + LoadBalancer external access
  listeners:
    advertisedListenersEnabled: true
    controller:
      tls:
        enabled: true
      authentication:
        type: plain
        jaasConfig:
          secretRef: credential
      externalAccess:
        type: loadBalancer
        loadBalancer:
          domain: my-domain.example.com
          brokerPrefix: kraft-east

  # Cross-Cluster Quorum Voters (used by dynamicQuorumConfig to generate bootstrap.servers)
  controllerQuorumVoters:
    # Region 1 (central namespace on my-cluster) - 3 controllers
    - nodeId: 100
      brokerEndpoint: kraft-central0.my-domain.example.com:9074
    - nodeId: 101
      brokerEndpoint: kraft-central1.my-domain.example.com:9074
    - nodeId: 102
      brokerEndpoint: kraft-central2.my-domain.example.com:9074
    # Region 2 (east namespace on my-clusterdev) - 3 controllers
    - nodeId: 200
      brokerEndpoint: kraft-east0.my-domain.example.com:9074
    - nodeId: 201
      brokerEndpoint: kraft-east1.my-domain.example.com:9074
    - nodeId: 202
      brokerEndpoint: kraft-east2.my-domain.example.com:9074

  # Dynamic Quorum Configuration — observer (NO bootstrapPod, joins existing quorum)
  dynamicQuorumConfig:
    enabled: true

  # MDS Kafka Cluster dependency for RBAC (OAuth auth to Kafka's MDS)
  dependencies:
    mdsKafkaCluster:
      bootstrapEndpoint: kafka-east-rep.my-domain.example.com:9073
      authentication:
        type: oauth
        jaasConfig:
          secretRef: oauth-jass
        oauthSettings:
          tokenEndpointUri: http://keycloak.my-domain.example.com:8080/realms/sso_test/protocol/openid-connect/token
      tls:
        enabled: true

---
# ClusterRole for external-dns
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-dns
rules:
- apiGroups: [""]
  resources: ["services","endpoints","pods"]
  verbs: ["get","watch","list"]
- apiGroups: ["extensions","networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get","watch","list"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["list"]
---
# ClusterRoleBinding for external-dns (region2)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-dns-__REGION2_NS__
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-dns
subjects:
- kind: ServiceAccount
  name: external-dns
  namespace: __REGION2_NS__
---
# ServiceAccount for external-dns (region2)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-dns
  namespace: __REGION2_NS__
  annotations:
    iam.gke.io/gcp-service-account: external-dns-sa@__PROJECT_ID__.iam.gserviceaccount.com
---
# Deployment for external-dns (region2)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: __REGION2_NS__
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      serviceAccountName: external-dns
      nodeSelector:
        iam.gke.io/gke-metadata-server-enabled: "true"
      containers:
      - name: external-dns
        image: registry.k8s.io/external-dns/external-dns:v0.14.2
        args:
        - --source=service
        - --namespace=__REGION2_NS__
        - --domain-filter=my-domain.example.com
        - --provider=google
        - --google-project=__PROJECT_ID__
        - --policy=sync
        - --txt-owner-id=__REGION2_NS__
        - --interval=5m
        - --log-level=info

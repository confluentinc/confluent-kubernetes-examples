---
# Kafka Cluster for Region 1 (Central)
# Cluster: my-cluster
# Greenfield deployment with full security
#
# Security: TLS (secretRef) + SASL/PLAIN on all listeners + RBAC with OAuth MDS (Keycloak)
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: central
  annotations:
    # Broker IDs: 30, 31 (avoids conflicts with east: 10, 11)
    platform.confluent.io/broker-id-offset: "30"
spec:
  replicas: 2
  dataVolumeCapacity: 10Gi

  image:
    application: confluentinc/cp-server:8.1.2
    init: confluentinc/confluent-init-container:3.2.0

  # TLS Configuration - secretRef based certificates
  tls:
    secretRef: tls-kafka

  # RBAC Authorization
  authorization:
    type: rbac
    superUsers:
      - User:kafka
      - User:ssologin

  # MDS (Metadata Service) for RBAC with OAuth identity provider (Keycloak)
  services:
    mds:
      tls:
        enabled: true
      tokenKeyPair:
        secretRef: mds-token
      externalAccess:
        type: loadBalancer
        loadBalancer:
          domain: my-domain.example.com
          prefix: kafka-central-mds
          advertisedURL:
            enabled: true
            prefix: kafka-central-mds
      provider:
        oauth:
          configurations:
            expectedIssuer: http://keycloak.my-domain.example.com:8080/realms/sso_test
            jwksEndpointUri: http://keycloak.my-domain.example.com:8080/realms/sso_test/protocol/openid-connect/certs
            subClaimName: client_id
    # Embedded REST proxy — OAuth auth for RBAC operations
    kafkaRest:
      authentication:
        type: oauth
        oauth:
          secretRef: oauth-jass
          configuration:
            tokenEndpointUri: http://keycloak.my-domain.example.com:8080/realms/sso_test/protocol/openid-connect/token
            expectedIssuer: http://keycloak.my-domain.example.com:8080/realms/sso_test
            jwksEndpointUri: http://keycloak.my-domain.example.com:8080/realms/sso_test/protocol/openid-connect/certs
            subClaimName: client_id

  # Listeners for MRC — all secured with TLS + SASL/PLAIN
  listeners:
    # Internal listener (inter-broker within same cluster)
    internal:
      tls:
        enabled: true
      authentication:
        type: plain
        jaasConfig:
          secretRef: credential
    # External listener (for clients)
    external:
      tls:
        enabled: true
      authentication:
        type: plain
        jaasConfig:
          secretRef: credential
      externalAccess:
        type: loadBalancer
        loadBalancer:
          domain: my-domain.example.com
          brokerPrefix: kafka-central-ext
          bootstrapPrefix: kafka-central-ext
    # Replication listener (for inter-broker communication across clusters)
    replication:
      tls:
        enabled: true
      authentication:
        type: plain
        jaasConfig:
          secretRef: credential
      externalAccess:
        type: loadBalancer
        loadBalancer:
          domain: my-domain.example.com
          brokerPrefix: kafka-central-rep
          bootstrapPrefix: kafka-central-rep

  # Reference the local KRaft controller cluster (with security)
  dependencies:
    kRaftController:
      clusterRef:
        name: kraftcontroller
      controllerListener:
        tls:
          enabled: true
        authentication:
          type: plain
          jaasConfig:
            secretRef: credential
    kafkaRest:
      authentication:
        type: oauth
        jaasConfig:
          secretRef: oauth-jass
        oauthSettings:
          tokenEndpointUri: http://keycloak.my-domain.example.com:8080/realms/sso_test/protocol/openid-connect/token
          expectedIssuer: http://keycloak.my-domain.example.com:8080/realms/sso_test
          jwksEndpointUri: http://keycloak.my-domain.example.com:8080/realms/sso_test/protocol/openid-connect/certs
          subClaimName: client_id

  # Metrics reporter — must use public DNS (replication listener) so producer can
  # reach ALL brokers including cross-cluster ones. Internal DNS fails cross-cluster.
  metricReporter:
    enabled: true
    bootstrapEndpoint: kafka-central-rep.my-domain.example.com:9072
    authentication:
      type: plain
      jaasConfig:
        secretRef: credential
    tls:
      enabled: true

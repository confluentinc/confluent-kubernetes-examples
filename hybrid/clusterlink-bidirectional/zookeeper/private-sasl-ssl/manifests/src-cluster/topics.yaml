# NOTE: forward-topic exists but CANNOT be mirrored to the private cluster
# because the INBOUND cluster cannot reach the public cluster to describe this topic.
# This topic is kept for reference but forward mirroring is NOT possible in private cluster mode.
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: forward-topic
  namespace: src
spec:
  replicas: 3
  partitionCount: 3
  kafkaRestClassRef:
    name: src-rest


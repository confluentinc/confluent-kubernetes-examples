# ClusterLink on PRIVATE cluster - INBOUND mode
# Only accepts connections from the public cluster
#
# ⚠️ GOTCHAS:
# 1. clusterID MUST be set for INBOUND mode
# 2. This link CANNOT become healthy until the OUTBOUND link initiates connection
# 3. Different credentials for src and dest clusters!
apiVersion: platform.confluent.io/v1beta1
kind: ClusterLink
metadata:
  name: dest-cluster-link
  namespace: dest
spec:
  name: bidirectional-private-link
  
  # Bidirectional mode with INBOUND connection mode for private cluster
  sourceInitiatedLink:
    linkMode: Bidirectional
    connectionMode: Inbound
  
  sourceKafkaCluster:
    # INBOUND is passive — bootstrapEndpoint is CFK validation only, not functionally used
    bootstrapEndpoint: placeholder-not-used-for-inbound:9092
    clusterID: "${SOURCE_CLUSTER_ID}"
    # ⚠️ NOTE: authentication is NOT required for INBOUND mode links
    # The INBOUND link is passive - it doesn't reach out to authenticate.
    # The OUTBOUND link (on public cluster) handles authentication.
    kafkaRestClassRef:
      name: src-rest
      namespace: src
  
  # INBOUND links don't need destinationKafkaCluster.authentication (no local.* configs needed)
  destinationKafkaCluster:
    kafkaRestClassRef:
      name: dest-rest
      namespace: dest
  
  # Mirror topics that this cluster wants from the remote cluster
  mirrorTopics:
    - name: forward-topic
      direction: toDestination

  configs:
    consumer.offset.sync.enable: "true"


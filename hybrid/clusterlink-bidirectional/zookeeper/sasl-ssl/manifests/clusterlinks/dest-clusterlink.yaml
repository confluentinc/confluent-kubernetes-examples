# ClusterLink on DESTINATION cluster - handles FORWARD mirroring
# ⚠️ IMPORTANT: Different credentials for src and dest clusters!
apiVersion: platform.confluent.io/v1beta1
kind: ClusterLink
metadata:
  name: dest-cluster-link
  namespace: dest
spec:
  name: bidirectional-link
  
  sourceInitiatedLink:
    linkMode: Bidirectional
  
  sourceKafkaCluster:
    bootstrapEndpoint: kafka.src.svc.cluster.local:9071
    # Uses SRC cluster credentials (src-credential secret)
    authentication:
      type: plain
      jaasConfig:
        secretRef: src-credential
    tls:
      enabled: true
      secretRef: tls-certs
    kafkaRestClassRef:
      name: src-rest
      namespace: src
  
  # Destination = LOCAL cluster
  # No dest.authentication needed for outbound-outbound — each side has its own connection
  destinationKafkaCluster:
    kafkaRestClassRef:
      name: dest-rest
      namespace: dest
    tls:
      enabled: true
      secretRef: tls-certs
  
  mirrorTopics:
    - name: forward-topic
      direction: toDestination
  
  configs:
    consumer.offset.sync.enable: "true"


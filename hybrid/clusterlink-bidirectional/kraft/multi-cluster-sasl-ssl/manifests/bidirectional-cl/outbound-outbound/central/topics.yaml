# Topics for central cluster
# central-topic: mirrored to east via east CL (toDestination)
# central-orders: mirrored to east via central CL (toSource)
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: central-topic
  namespace: central
spec:
  replicas: 3
  partitionCount: 3
  configs:
    cleanup.policy: "delete"
  kafkaRestClassRef:
    name: central-rest
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: central-orders
  namespace: central
spec:
  replicas: 3
  partitionCount: 3
  configs:
    cleanup.policy: "delete"
  kafkaRestClassRef:
    name: central-rest

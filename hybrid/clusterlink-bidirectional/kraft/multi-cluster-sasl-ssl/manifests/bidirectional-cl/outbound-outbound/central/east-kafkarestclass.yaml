# Remote KafkaRestClass on central cluster, pointing to east's REST API via LoadBalancer
# Used by ClusterLink to manage mirror topics on the east cluster
apiVersion: platform.confluent.io/v1beta1
kind: KafkaRestClass
metadata:
  name: east-rest
  namespace: central
spec:
  kafkaRest:
    endpoint: https://kafka-east-rest.my-domain.example.com:443
    authentication:
      type: basic
      basic:
        secretRef: east-rest-credential
    tls:
      secretRef: tls-kafka

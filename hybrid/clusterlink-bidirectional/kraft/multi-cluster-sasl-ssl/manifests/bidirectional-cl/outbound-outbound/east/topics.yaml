# Topics for east cluster
# east-topic: mirrored to central via central CL (toDestination)
# east-orders: mirrored to central via east CL (toSource)
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: east-topic
  namespace: east
spec:
  replicas: 3
  partitionCount: 3
  configs:
    cleanup.policy: "delete"
  kafkaRestClassRef:
    name: east-rest
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: east-orders
  namespace: east
spec:
  replicas: 3
  partitionCount: 3
  configs:
    cleanup.policy: "delete"
  kafkaRestClassRef:
    name: east-rest

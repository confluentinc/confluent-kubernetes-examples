# Topics for central cluster (public)
# central-topic: original on central, mirrored to east via OUTBOUND link
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: central-topic
  namespace: central
spec:
  replicas: 3
  partitionCount: 3
  kafkaRestClassRef:
    name: central-rest

# ClusterLink on EAST (private) cluster — INBOUND
#
# Case 4: Bidirectional with firewall
# East is passive — only accepts incoming connection from central.
# MUST be created BEFORE the OUTBOUND CR on central.
#
# clusterID required — INBOUND can't reach central to discover it
apiVersion: platform.confluent.io/v1beta1
kind: ClusterLink
metadata:
  name: east-cluster-link
  namespace: east
spec:
  name: bidirectional-private-link
  sourceInitiatedLink:
    linkMode: Bidirectional
    connectionMode: Inbound
  # Remote: central (public)
  # INBOUND is passive — doesn't connect out. bootstrapEndpoint and kafkaRestClassRef
  # are CFK validation requirements only. The actual values don't matter for INBOUND —
  # bootstrapEndpoint can be a placeholder, kafkaRestClassRef CR must exist but endpoint
  # doesn't need to be reachable. TLS/auth on source are ignored for INBOUND.
  sourceKafkaCluster:
    bootstrapEndpoint: placeholder-not-used-for-inbound:9092
    clusterID: CENTRAL_CLUSTER_ID_PLACEHOLDER
    kafkaRestClassRef:
      name: central-rest
      namespace: east
  # Local: east (private)
  destinationKafkaCluster:
    kafkaRestClassRef:
      name: east-rest
      namespace: east
  mirrorTopics:
    # Pull central-topic from central to east
    - name: central-topic
      direction: toDestination
  configs:
    consumer.offset.sync.enable: "true"

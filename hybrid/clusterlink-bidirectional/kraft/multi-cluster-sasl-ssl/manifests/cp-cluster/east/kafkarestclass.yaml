# Local KafkaRestClass for east cluster
# Points to the local Kafka REST API with basic auth credentials
apiVersion: platform.confluent.io/v1beta1
kind: KafkaRestClass
metadata:
  name: east-rest
  namespace: east
spec:
  kafkaClusterRef:
    name: kafka
  kafkaRest:
    authentication:
      type: basic
      basic:
        secretRef: local-rest-credential

# Step 4a - FlinkComputePool (DEDICATED)
#
# A DEDICATED pool owns a fixed set of resources reserved for its statements.
# spec.type is immutable. spec.state must be omitted for DEDICATED pools (it is
# only valid for SHARED pools - enforced by a CEL rule on the CRD).
---
apiVersion: platform.confluent.io/v1beta1
kind: FlinkComputePool
metadata:
  name: dedicated-pool
  namespace: operator
spec:
  type: DEDICATED
  flinkEnvironment: flink-env1
  clusterSpec:
    flinkVersion: v1_19
  cmfRestClassRef:
    name: default
    namespace: operator

# Step 1b - FlinkEnvironmentSecretMapping
#
# Makes the FlinkSecret usable by catalogs/databases in this environment. Without a
# mapping, CMF silently ignores any catalog whose connectionSecretId is unmapped.
# CMF keys an environment's secrets by the MAPPING name, so this resource's name
# must equal the connectionSecretId the catalog/database reference
# (flink-connection-secret); secretRef points at the FlinkSecret to expose.
---
apiVersion: platform.confluent.io/v1beta1
kind: FlinkEnvironmentSecretMapping
metadata:
  name: flink-connection-secret
  namespace: operator
spec:
  flinkEnvironment: flink-env1
  secretRef:
    name: flink-connection-secret
  cmfRestClassRef:
    name: default
    namespace: operator

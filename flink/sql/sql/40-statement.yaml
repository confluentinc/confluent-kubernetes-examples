# Step 6 - FlinkStatement
#
# A FlinkStatement runs a single Flink SQL statement on a compute pool within an
# environment. This streaming INSERT continuously aggregates the `pageviews` source
# into the `pageviews_by_user` sink (both created in step 5, in the `clickstream`
# database). spec.statement is immutable once the statement is running - change the
# SQL by creating a new FlinkStatement. Set spec.stopped: true to stop the running
# statement without deleting it.
---
apiVersion: platform.confluent.io/v1beta1
kind: FlinkStatement
metadata:
  name: pageviews-by-user
  namespace: operator
spec:
  flinkEnvironment: flink-env1
  computePoolName: dedicated-pool
  # A streaming INSERT requires checkpointing; enable it here (or on the compute pool).
  flinkConfiguration:
    execution.checkpointing.interval: "10s"
  statement: |
    INSERT INTO `kafka-catalog`.`clickstream`.`pageviews_by_user`
    SELECT user_id, COUNT(*) AS view_count
    FROM `kafka-catalog`.`clickstream`.`pageviews`
    GROUP BY user_id;
  cmfRestClassRef:
    name: default
    namespace: operator

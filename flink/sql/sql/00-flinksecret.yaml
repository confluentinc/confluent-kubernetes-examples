# Step 1 - FlinkSecret
#
# A FlinkSecret syncs the data of a same-namespace Kubernetes Secret to CMF, where
# it becomes a named secret that the KafkaCatalog / KafkaDatabase reference (by the
# FlinkSecret name) via connectionSecretId / connectionSecretRef. CFK tracks the
# backing Secret's resourceVersion and re-syncs CMF on rotation.
#
# The Kubernetes Secret below is the "real source". In production it can be produced
# by any tool that emits a standard Secret (External Secrets Operator, Sealed
# Secrets, Vault) - see ../secret-managers/. For this dev cluster the values are
# placeholders; populate them with the credentials CMF needs to reach Kafka and
# Schema Registry when those endpoints require authentication.
---
apiVersion: v1
kind: Secret
metadata:
  name: flink-connection-credentials
  namespace: operator
type: Opaque
stringData:
  # Keys are passed through to CMF as-is and merged into the catalog/database
  # connectionConfig at runtime. Adjust to match your Kafka/SR security settings.
  schema.registry.basic.auth.user.info: "sr-user:sr-password"
  sasl.jaas.config: "org.apache.kafka.common.security.plain.PlainLoginModule required username='kafka-user' password='kafka-password';"
---
apiVersion: platform.confluent.io/v1beta1
kind: FlinkSecret
metadata:
  name: flink-connection-secret
  namespace: operator
spec:
  # secretRef is the name of the Kubernetes Secret above (same namespace).
  secretRef: flink-connection-credentials
  cmfRestClassRef:
    name: default
    namespace: operator

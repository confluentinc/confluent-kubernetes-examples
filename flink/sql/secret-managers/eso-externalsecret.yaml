# External Secrets Operator (ESO) - adapt to your cluster.
# Produces the flink-connection-credentials Secret (see ../Readme.md, "Using an
# external secret manager"). Prerequisite: install ESO (helm repo external-secrets,
# chart external-secrets) and a backend. Values below assume Vault KV.
# Docs: https://external-secrets.io/
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: flink-secret-store
  namespace: operator
spec:
  provider:
    vault:
      server: http://vault.vault.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: flink-secret-reader
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: flink-connection-credentials
  namespace: operator
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: flink-secret-store
    kind: SecretStore
  target:
    # Must match spec.secretRef on the FlinkSecret.
    name: flink-connection-credentials
    creationPolicy: Owner
  data:
    - secretKey: schema.registry.basic.auth.user.info
      remoteRef:
        key: flink/connection
        property: schema.registry.basic.auth.user.info
    - secretKey: sasl.jaas.config
      remoteRef:
        key: flink/connection
        property: sasl.jaas.config

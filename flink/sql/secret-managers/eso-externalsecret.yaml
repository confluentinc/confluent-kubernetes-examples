# External Secrets Operator (ESO) - adapt to your cluster.
#
# This produces the SAME Kubernetes Secret (flink-connection-credentials) that
# sql/00-flinksecret.yaml hand-writes. With ESO running, apply this instead of the
# inline Secret; the FlinkSecret CR is unchanged and still references the Secret by
# name. Prerequisite: install ESO (helm repo external-secrets, chart external-secrets)
# and a backend (Vault, AWS/GCP Secrets Manager, etc.). Values below assume Vault KV.
#
# Docs: https://external-secrets.io/
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: flink-secret-store
  namespace: operator
spec:
  provider:
    vault:
      server: http://vault.vault.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: flink-secret-reader
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: flink-connection-credentials
  namespace: operator
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: flink-secret-store
    kind: SecretStore
  target:
    # Must match spec.secretRef on the FlinkSecret.
    name: flink-connection-credentials
    creationPolicy: Owner
  data:
    - secretKey: schema.registry.basic.auth.user.info
      remoteRef:
        key: flink/connection
        property: sr_basic_auth
    - secretKey: sasl.jaas.config
      remoteRef:
        key: flink/connection
        property: kafka_jaas

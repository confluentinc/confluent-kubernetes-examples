# Sealed Secrets (Bitnami) - adapt to your cluster.
# A SealedSecret is safe to commit to git; the in-cluster controller decrypts it
# into the flink-connection-credentials Secret (see ../README.md, "Using an external
# secret manager"). The encryptedData below is a PLACEHOLDER - it will not decrypt on
# your cluster. Generate your own with kubeseal against your controller:
#
#   # install controller: helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
#   kubectl create secret generic flink-connection-credentials -n operator \
#     --from-literal=schema.registry.basic.auth.user.info='sr-user:sr-password' \
#     --from-literal=sasl.jaas.config="org.apache.kafka.common.security.plain.PlainLoginModule required username='kafka-user' password='kafka-password';" \
#     --dry-run=client -o yaml | kubeseal --format yaml > sealed-secret.yaml
#
# Docs: https://github.com/bitnami-labs/sealed-secrets
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: flink-connection-credentials
  namespace: operator
spec:
  encryptedData:
    schema.registry.basic.auth.user.info: AgB...REPLACE_WITH_KUBESEAL_OUTPUT...
    sasl.jaas.config: AgB...REPLACE_WITH_KUBESEAL_OUTPUT...
  template:
    metadata:
      name: flink-connection-credentials
      namespace: operator
    type: Opaque

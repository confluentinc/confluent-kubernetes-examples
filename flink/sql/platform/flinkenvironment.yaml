# FlinkEnvironment is the CMF environment that the Flink SQL resources below are
# scoped to. Every FlinkComputePool / FlinkKafkaCatalog / FlinkKafkaDatabase /
# FlinkStatement references this environment by name (spec.flinkEnvironment).
# kubernetesNamespace is where the Flink workloads (job/task managers) are created.
---
apiVersion: platform.confluent.io/v1beta1
kind: FlinkEnvironment
metadata:
  name: flink-env1
  namespace: operator
spec:
  kubernetesNamespace: default
  flinkApplicationDefaults:
    spec:
      flinkConfiguration:
        taskmanager.numberOfTaskSlots: "2"
  cmfRestClassRef:
    name: default
    namespace: operator

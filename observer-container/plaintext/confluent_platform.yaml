apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: confluent
spec:
  dataVolumeCapacity: 10G
  image:
    application: docker.io/confluentinc/cp-server:8.0.0
    init: confluentinc/confluent-init-container:3.2.0
    pullSecretRef:
      - confluent-registry
  replicas: 3
  services:
    observer:
      image: confluentinc/confluent-observer-container:3.2.0
---
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: confluent
spec:
  dataVolumeCapacity: 10G
  image:
    application: docker.io/confluentinc/cp-server:8.0.0
    init: confluentinc/confluent-init-container:3.2.0
    pullSecretRef:
      - confluent-registry
  replicas: 3
  dependencies:
    kRaftController:
      clusterRef:
        name: kraftcontroller
  services:
    observer:
      image: confluentinc/confluent-observer-container:3.2.0
---

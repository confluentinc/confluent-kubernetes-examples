# External Secrets Operator (ESO) configuration for TLS secrets
# ESO automatically syncs secrets from Vault to K8s, with auto-refresh
#
# Basic Auth is still handled by Vault Agent Injector
# TLS secrets are handled by ESO (more production-ready than CSI syncSecret)
---
# SecretStore - defines how to connect to Vault
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: vault-example-3
spec:
  provider:
    vault:
      server: "http://vault.vault-example-3.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "confluent-operator"
          serviceAccountRef:
            name: "default"
---
# ExternalSecret for Prometheus TLS
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: prometheus-tls
  namespace: vault-example-3
spec:
  refreshInterval: 1h  # Check Vault every hour for updates
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: prometheus-tls
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        tls.crt: "{{ .tls_crt }}"
        tls.key: "{{ .tls_key }}"
        ca.crt: "{{ .ca_crt }}"
  data:
    - secretKey: tls_crt
      remoteRef:
        key: confluent/prometheus-tls
        property: tls_crt
    - secretKey: tls_key
      remoteRef:
        key: confluent/prometheus-tls
        property: tls_key
    - secretKey: ca_crt
      remoteRef:
        key: confluent/ca
        property: ca_crt
---
# ExternalSecret for AlertManager TLS
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-tls
  namespace: vault-example-3
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: alertmanager-tls
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        tls.crt: "{{ .tls_crt }}"
        tls.key: "{{ .tls_key }}"
        ca.crt: "{{ .ca_crt }}"
  data:
    - secretKey: tls_crt
      remoteRef:
        key: confluent/alertmanager-tls
        property: tls_crt
    - secretKey: tls_key
      remoteRef:
        key: confluent/alertmanager-tls
        property: tls_key
    - secretKey: ca_crt
      remoteRef:
        key: confluent/ca
        property: ca_crt
---
# ExternalSecret for Prometheus Client TLS (CA only)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: prometheus-client-tls
  namespace: vault-example-3
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: prometheus-client-tls
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        ca.crt: "{{ .ca_crt }}"
  data:
    - secretKey: ca_crt
      remoteRef:
        key: confluent/ca
        property: ca_crt
---
# ExternalSecret for AlertManager Client TLS (CA only)
apiVersion: external-secrets.io/v1
kind: ExternalSecret

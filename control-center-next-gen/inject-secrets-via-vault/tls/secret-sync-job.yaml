# Job to trigger CSI syncSecret and create K8s Secrets from Vault
# This Job runs once, mounts the CSI volume, which triggers syncSecret,
# then completes. The secrets persist after the Job completes.
#
# IMPORTANT: CSI driver must be installed with:
#   --set syncSecret.enabled=true
#   --set syncSecret.deleteSecretOnPodDelete=false
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-secret-sync
  namespace: vault-example-2
spec:
  ttlSecondsAfterFinished: 300  # Auto-cleanup Job after 5 minutes
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: vault-secret-sync
    spec:
      serviceAccountName: default
      restartPolicy: Never
      containers:
        - name: sync
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              echo "Mounting CSI volume to trigger syncSecret..."
              ls -la /mnt/vault-tls/
              echo "Secrets synced successfully!"
              echo "Waiting 10 seconds for sync to complete..."
              sleep 10
              echo "Done. Job will complete and secrets will persist."
          volumeMounts:
            - name: vault-tls-secrets
              mountPath: /mnt/vault-tls
              readOnly: true
      volumes:
        - name: vault-tls-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "vault-c3-tls"

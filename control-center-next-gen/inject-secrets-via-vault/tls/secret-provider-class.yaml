# SecretProviderClass for TLS certificates with syncSecret
# This syncs Vault TLS secrets to K8s Secrets that can be used via secretRef
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: vault-c3-tls
  namespace: vault-example-2
spec:
  provider: vault
  parameters:
    vaultAddress: "http://vault.vault-example-2.svc.cluster.local:8200"
    roleName: "confluent-operator"
    
    # Objects to fetch from Vault
    objects: |
      - objectName: "prometheus-tls-crt"
        secretPath: "secret/data/confluent/prometheus-tls"
        secretKey: "tls_crt"
      - objectName: "prometheus-tls-key"
        secretPath: "secret/data/confluent/prometheus-tls"
        secretKey: "tls_key"
      - objectName: "alertmanager-tls-crt"
        secretPath: "secret/data/confluent/alertmanager-tls"
        secretKey: "tls_crt"
      - objectName: "alertmanager-tls-key"
        secretPath: "secret/data/confluent/alertmanager-tls"
        secretKey: "tls_key"
      - objectName: "ca-crt"
        secretPath: "secret/data/confluent/ca"
        secretKey: "ca_crt"
  
  # Sync mounted secrets to K8s Secrets
  # These K8s Secrets are created when the CSI volume is mounted
  secretObjects:
    # Prometheus server TLS secret (for secretRef)
    # Includes CA cert as ca.crt which operator mounts as cacerts.pem
    - secretName: prometheus-tls
      type: Opaque
      data:
        - objectName: prometheus-tls-crt
          key: tls.crt
        - objectName: prometheus-tls-key
          key: tls.key
        - objectName: ca-crt
          key: ca.crt
    
    # AlertManager server TLS secret (for secretRef)
    # Includes CA cert as ca.crt which operator mounts as cacerts.pem
    - secretName: alertmanager-tls
      type: Opaque
      data:
        - objectName: alertmanager-tls-crt
          key: tls.crt
        - objectName: alertmanager-tls-key
          key: tls.key
        - objectName: ca-crt
          key: ca.crt
    
    # Prometheus client TLS secret (CA cert for verification)
    - secretName: prometheus-client-tls
      type: Opaque
      data:
        - objectName: ca-crt
          key: ca.crt
    
    # AlertManager client TLS secret (CA cert for verification)
    - secretName: alertmanager-client-tls
      type: Opaque
      data:
        - objectName: ca-crt
          key: ca.crt

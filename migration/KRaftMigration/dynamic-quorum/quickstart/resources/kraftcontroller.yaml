apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: confluent
  annotations:
    platform.confluent.io/kraft-migration-hold-krc-creation: "true"
spec:
  replicas: 3
  dataVolumeCapacity: 10Gi
  image:
    # Test 1: Try CP 7.9.6 (latest patch in 7.9 series)
    # If observer promotion fails, retry with CP 8.2 for KRaft controllers
    application: confluentinc/cp-server:7.9.6
    init: confluentinc/confluent-init-container:3.2.0

  # Dynamic quorum configuration (KIP-853)
  dynamicQuorumConfig:
    enabled: true
    bootstrapPod: 0

  # Service account for ConfigMap updates
  podTemplate:
    serviceAccountName: kraftcontroller

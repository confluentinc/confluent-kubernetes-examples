---
# Kafka with ZooKeeper dependency (pre-migration) for Region 1 (Central)
# Cluster: <region1-cluster>, Namespace: central
# Security: TLS (secretRef) + SASL/PLAIN + RBAC with OAuth MDS (Keycloak)
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: central
  annotations:
    platform.confluent.io/use-log4j1: "true"
    platform.confluent.io/use-old-jetty9: "true"
    # Broker IDs: 30, 31 (avoids conflicts with east: 10, 11)
    platform.confluent.io/broker-id-offset: "30"
    # IMPORTANT: Set IBP version for migration
    # Default is 3.6 which is incompatible with dynamic quorum (kraft.version=1)
    platform.confluent.io/kraft-migration-ibp-version: "3.9"
spec:
  replicas: 2
  dataVolumeCapacity: 10Gi

  image:
    application: confluentinc/cp-server:7.9.6
    init: confluentinc/confluent-init-container:3.2.0

  # TLS Configuration - secretRef based certificates
  tls:
    secretRef: tls-kafka

  # RBAC Authorization
  authorization:
    type: rbac
    superUsers:
      - User:kafka
      - User:ssologin

  # MDS (Metadata Service) for RBAC with OAuth identity provider (Keycloak)
  services:
    mds:
      tls:
        enabled: true
      tokenKeyPair:
        secretRef: mds-token
      externalAccess:
        type: loadBalancer
        loadBalancer:
          domain: example.com
          prefix: kafka-central-mds
          advertisedURL:
            enabled: true
            prefix: kafka-central-mds
      provider:
        oauth:
          configurations:
            expectedIssuer: http://keycloak.example.com:8080/realms/sso_test
            jwksEndpointUri: http://keycloak.example.com:8080/realms/sso_test/protocol/openid-connect/certs
            subClaimName: client_id
    # Embedded REST proxy — OAuth auth for RBAC operations
    kafkaRest:
      authentication:
        type: oauth
        oauth:
          secretRef: oauth-jass
          configuration:
            tokenEndpointUri: http://keycloak.example.com:8080/realms/sso_test/protocol/openid-connect/token
            expectedIssuer: http://keycloak.example.com:8080/realms/sso_test
            jwksEndpointUri: http://keycloak.example.com:8080/realms/sso_test/protocol/openid-connect/certs
            subClaimName: client_id

  # Listeners for MRC — all secured with TLS + SASL/PLAIN
  listeners:
    # Internal listener (inter-broker within same cluster)
    internal:
      tls:
        enabled: true
      authentication:
        type: plain
        jaasConfig:
          secretRef: credential
    # External listener (for clients)
    external:
      tls:
        enabled: true
      authentication:
        type: plain
        jaasConfig:
          secretRef: credential
      externalAccess:
        type: loadBalancer
        loadBalancer:
          domain: example.com
          brokerPrefix: kafka-central-ext
          bootstrapPrefix: kafka-central-ext
    # Replication listener (for inter-broker communication across clusters)
    replication:
      tls:
        enabled: true
      authentication:
        type: plain
        jaasConfig:
          secretRef: credential
      externalAccess:
        type: loadBalancer
        loadBalancer:
          domain: example.com
          brokerPrefix: kafka-central-rep
          bootstrapPrefix: kafka-central-rep

  # ZooKeeper dependency (pre-migration)
  # Uses local ZK internal DNS + remote ZK public DNS with /mrc chroot
  dependencies:
    zookeeper:
      endpoint: zookeeper.central.svc.cluster.local:2182,zk-east.example.com:2182/mrc
      tls:
        enabled: true
      authentication:
        type: digest
        jaasConfig:
          secretRef: credential
    kafkaRest:
      authentication:
        type: oauth
        jaasConfig:
          secretRef: oauth-jass
        oauthSettings:
          tokenEndpointUri: http://keycloak.example.com:8080/realms/sso_test/protocol/openid-connect/token
          expectedIssuer: http://keycloak.example.com:8080/realms/sso_test
          jwksEndpointUri: http://keycloak.example.com:8080/realms/sso_test/protocol/openid-connect/certs
          subClaimName: client_id

  # Metrics reporter — must use public DNS (replication listener) so producer can
  # reach ALL brokers including cross-cluster ones. Internal DNS fails cross-cluster.
  metricReporter:
    enabled: true
    bootstrapEndpoint: kafka-central-rep.example.com:9072
    authentication:
      type: plain
      jaasConfig:
        secretRef: credential
    tls:
      enabled: true


  # CP 7.9.6: configOverrides.jvm replaces allowed.urls=* from CFK template
  configOverrides:
    jvm:
      - "-Dorg.apache.kafka.sasl.oauthbearer.allowed.urls=http://keycloak.example.com:8080/realms/sso_test/protocol/openid-connect/certs,http://keycloak.example.com:8080/realms/sso_test/protocol/openid-connect/token,http://keycloak.example.com:8080/"

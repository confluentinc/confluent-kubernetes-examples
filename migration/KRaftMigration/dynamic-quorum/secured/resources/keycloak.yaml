---
# Keycloak OIDC Identity Provider for MDS OAuth (Central)
# Deployed once in Region 1 — both regions reference via LoadBalancer DNS
# Namespace is parameterized — replace __NAMESPACE__ before applying
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: __NAMESPACE__
  labels:
    app: keycloak
  annotations:
    # external-dns will create: keycloak.example.com
    external-dns.alpha.kubernetes.io/hostname: keycloak.example.com
spec:
  type: LoadBalancer
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: __NAMESPACE__
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:22.0.1
          args:
            - "start-dev"
            - "--import-realm"
          env:
            - name: KEYCLOAK_ADMIN
              value: "admin"
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: "admin"
            - name: KC_PROXY
              value: "edge"
            - name: KC_HTTP_ACCESS_LOG_ENABLED
              value: "true"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8080
          volumeMounts:
            - name: keycloak-volume
              mountPath: /opt/keycloak/data/import
      volumes:
        - name: keycloak-volume
          configMap:
            name: keycloak-configmap

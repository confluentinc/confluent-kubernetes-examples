---
# Kafka with ZooKeeper dependency (pre-migration) for Region 2 (East)
# Cluster: rbadiani-dev, Namespace: east
# Security: TLS (secretRef) + SASL/PLAIN + RBAC with OAuth MDS (Keycloak)
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: east
  annotations:
    platform.confluent.io/use-log4j1: "true"
    platform.confluent.io/use-old-jetty9: "true"
    # Broker IDs: 10, 11 (avoids conflicts with central: 30, 31)
    platform.confluent.io/broker-id-offset: "10"
    # IMPORTANT: Set IBP version for migration
    platform.confluent.io/kraft-migration-ibp-version: "3.9"
spec:
  replicas: 2
  dataVolumeCapacity: 10Gi

  image:
    application: confluentinc/cp-server:7.9.6
    init: confluentinc/confluent-init-container:3.2.0

  # TLS Configuration - secretRef based certificates
  tls:
    secretRef: tls-kafka

  # RBAC Authorization
  authorization:
    type: rbac
    superUsers:
      - User:kafka
      - User:ssologin

  # MDS (Metadata Service) for RBAC with OAuth identity provider (Keycloak)
  services:
    mds:
      tls:
        enabled: true
      tokenKeyPair:
        secretRef: mds-token
      externalAccess:
        type: loadBalancer
        loadBalancer:
          domain: example.com
          prefix: kafka-east-mds
          advertisedURL:
            enabled: true
            prefix: kafka-east-mds
      provider:
        oauth:
          configurations:
            expectedIssuer: http://keycloak.example.com:8080/realms/sso_test
            jwksEndpointUri: http://keycloak.example.com:8080/realms/sso_test/protocol/openid-connect/certs
            subClaimName: client_id
    kafkaRest:
      authentication:
        type: oauth
        oauth:
          secretRef: oauth-jass
          configuration:
            tokenEndpointUri: http://keycloak.example.com:8080/realms/sso_test/protocol/openid-connect/token
            expectedIssuer: http://keycloak.example.com:8080/realms/sso_test
            jwksEndpointUri: http://keycloak.example.com:8080/realms/sso_test/protocol/openid-connect/certs
            subClaimName: client_id

  # Listeners for MRC — all secured with TLS + SASL/PLAIN
  listeners:
    internal:
      tls:
        enabled: true
      authentication:
        type: plain
        jaasConfig:
          secretRef: credential
    external:
      tls:
        enabled: true
      authentication:
        type: plain
        jaasConfig:
          secretRef: credential
      externalAccess:
        type: loadBalancer
        loadBalancer:
          domain: example.com
          brokerPrefix: kafka-east-ext
          bootstrapPrefix: kafka-east-ext
    replication:
      tls:
        enabled: true
      authentication:
        type: plain
        jaasConfig:
          secretRef: credential
      externalAccess:
        type: loadBalancer
        loadBalancer:
          domain: example.com
          brokerPrefix: kafka-east-rep
          bootstrapPrefix: kafka-east-rep

  # ZooKeeper dependency (pre-migration)
  # Uses local ZK internal DNS + remote ZK public DNS with /mrc chroot
  dependencies:
    zookeeper:
      endpoint: zk-central.example.com:2182,zookeeper.east.svc.cluster.local:2182/mrc
      tls:
        enabled: true
      authentication:
        type: digest
        jaasConfig:
          secretRef: credential
    kafkaRest:
      authentication:
        type: oauth
        jaasConfig:
          secretRef: oauth-jass
        oauthSettings:
          tokenEndpointUri: http://keycloak.example.com:8080/realms/sso_test/protocol/openid-connect/token
          expectedIssuer: http://keycloak.example.com:8080/realms/sso_test
          jwksEndpointUri: http://keycloak.example.com:8080/realms/sso_test/protocol/openid-connect/certs
          subClaimName: client_id

  # Metrics reporter — must use public DNS (replication listener)
  metricReporter:
    enabled: true
    bootstrapEndpoint: kafka-east-rep.example.com:9072
    authentication:
      type: plain
      jaasConfig:
        secretRef: credential
    tls:
      enabled: true


  # CP 7.9.6: configOverrides.jvm replaces allowed.urls=* from CFK template
  configOverrides:
    jvm:
      - "-Dorg.apache.kafka.sasl.oauthbearer.allowed.urls=http://keycloak.example.com:8080/realms/sso_test/protocol/openid-connect/certs,http://keycloak.example.com:8080/realms/sso_test/protocol/openid-connect/token,http://keycloak.example.com:8080/"

---
# ZooKeeper for Region 2 (East)
# Cluster: rbadiani-dev, Namespace: east
# MRC: 3 central + 2 east = 5 total (odd, required for ZK quorum)
# Security: TLS (secretRef) + Digest authentication
apiVersion: platform.confluent.io/v1beta1
kind: Zookeeper
metadata:
  name: zookeeper
  namespace: east
  annotations:
    platform.confluent.io/use-log4j1: "true"
    platform.confluent.io/use-old-jetty9: "true"
    # ZK myid offset: east nodes start at 10 (central: 0-2, east: 10-11)
    platform.confluent.io/zookeeper-myid-offset: "10"
spec:
  replicas: 2
  dataVolumeCapacity: 10Gi
  logVolumeCapacity: 10Gi

  image:
    application: confluentinc/cp-zookeeper:7.9.6
    init: confluentinc/confluent-init-container:3.2.0

  tls:
    secretRef: tls-zookeeper

  authentication:
    type: digest
    jaasConfig:
      secretRef: credential

  externalAccess:
    type: loadBalancer
    loadBalancer:
      domain: example.com
      prefix: zk-east
      advertisedURL:
        enabled: true
        prefix: zk-east

  # MRC peers — 5 total (3 central + 2 east)
  # Local nodes: internal DNS, Remote nodes: public DNS via LoadBalancer
  peers:
    - server.0=zk-central0.example.com:2888:3888
    - server.1=zk-central1.example.com:2888:3888
    - server.2=zk-central2.example.com:2888:3888
    - server.10=zookeeper-0.zookeeper.east.svc.cluster.local:2888:3888
    - server.11=zookeeper-1.zookeeper.east.svc.cluster.local:2888:3888

# DC3 KRaft controller — lite mode (0.5DC tiebreaker), mTLS+RBAC
#
# Key differences from DC1/DC2:
#   - spec.dependencies.migration.zookeeper: provides ZK connection for KMJ
#     with TLS enabled (ZK uses port 2182 for TLS)
#   - spec.clusterID: must be set manually — fetch from broker:
#     kubectl exec kafka-0 -n east --context $CTX1 -- grep cluster.id /mnt/data/data0/logs/meta.properties | cut -d= -f2
#   - mdsKafkaCluster: points to DC1's Kafka (no Kafka in DC3)
#   - kraft-migration-hold-krc-creation: set — lite KMJ releases it
#   - No configOverrides for zookeeper.connect, migration.enable, or IBP
apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller-central
  namespace: central
  annotations:
    platform.confluent.io/broker-id-offset: "9994"
    platform.confluent.io/kraft-migration-hold-krc-creation: "true"
spec:
  # clusterID: <PATCH_AFTER_DC1_KRC_GETS_CLUSTER_ID>
  authorization:
    superUsers:
      - User:kafka
      - User:kafka-mds-client
    type: rbac
  dependencies:
    mdsKafkaCluster:
      authentication:
        jaasConfig:
          secretRef: credential-mds
        type: plain
      bootstrapEndpoint: kafka-east.platformops.dev.gcp.devel.cpdev.cloud:9072
      tls:
        enabled: true
    migration:
      zookeeper:
        endpoint: zk-central.platformops.dev.gcp.devel.cpdev.cloud:2182,zk-east.platformops.dev.gcp.devel.cpdev.cloud:2182,zk-west.platformops.dev.gcp.devel.cpdev.cloud:2182/mrc
        tls:
          enabled: true
  controllerQuorumVoters:
    - brokerEndpoint: kraft-east0.platformops.dev.gcp.devel.cpdev.cloud:9074
      nodeId: 9990
    - brokerEndpoint: kraft-east1.platformops.dev.gcp.devel.cpdev.cloud:9074
      nodeId: 9991
    - brokerEndpoint: kraft-west0.platformops.dev.gcp.devel.cpdev.cloud:9074
      nodeId: 9992
    - brokerEndpoint: kraft-west1.platformops.dev.gcp.devel.cpdev.cloud:9074
      nodeId: 9993
    - brokerEndpoint: kraft-central0.platformops.dev.gcp.devel.cpdev.cloud:9074
      nodeId: 9994
  dataVolumeCapacity: 10G
  image:
    application: confluentinc/cp-server:7.9.6
    init: confluentinc/confluent-init-container:3.3.0
  listeners:
    replication:
      enabled: true
      authentication:
        type: plain
        jaasConfig:
          secretRef: credential
      tls:
        enabled: true
    controller:
      authentication:
        type: plain
        jaasConfig:
          secretRef: credential
      tls:
        enabled: true
      externalAccess:
        type: loadBalancer
        loadBalancer:
          bootstrapPrefix: kraft-central-bootstrap
          brokerPrefix: kraft-central
          domain: platformops.dev.gcp.devel.cpdev.cloud
  replicas: 1
  tls:
    secretRef: tls-central

# RBAC for KRaftController service account to update the dynamic quorum
# bootstrap ConfigMap. Only needed in the bootstrap region (east).
#
# The kraftcontroller-sa service account is referenced by
# east.yaml's podTemplate.serviceAccountName. The init container
# uses this SA to read/update the ConfigMap after formatting.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kraftcontroller-sa
  namespace: east
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kraftcontroller-configmap-updater
  namespace: east
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["kraftcontroller-east-dynamic-quorum"]
  verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kraftcontroller-configmap-updater
  namespace: east
subjects:
- kind: ServiceAccount
  name: kraftcontroller-sa
  namespace: east
roleRef:
  kind: Role
  name: kraftcontroller-configmap-updater
  apiGroup: rbac.authorization.k8s.io

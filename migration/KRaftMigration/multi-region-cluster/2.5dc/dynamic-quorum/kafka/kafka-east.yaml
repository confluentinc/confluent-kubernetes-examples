apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: east
  annotations:
    platform.confluent.io/broker-id-offset: "10"
spec:
  dependencies:
    zookeeper:
      endpoint: zk-central0.platformops.dev.gcp.devel.cpdev.cloud:2181,zookeeper.east.svc.cluster.local:2181,zk-west.platformops.dev.gcp.devel.cpdev.cloud:2181/mrc
  image:
    application: confluentinc/cp-server:7.9.6
    init: confluentinc/confluent-init-container:3.3.0
  listeners:
    external:
      externalAccess:
        type: loadBalancer
        loadBalancer:
          bootstrapPrefix: kraft-kafka-mrc-east-ext
          brokerPrefix: kraft-kafka-mrc-east-ext
          domain: platformops.dev.gcp.devel.cpdev.cloud
    replication:
      externalAccess:
        type: loadBalancer
        loadBalancer:
          bootstrapPrefix: kraft-kafka-mrc-east-rep
          brokerPrefix: kraft-kafka-mrc-east-rep
          domain: platformops.dev.gcp.devel.cpdev.cloud
  replicas: 2
  dataVolumeCapacity: 10Gi
